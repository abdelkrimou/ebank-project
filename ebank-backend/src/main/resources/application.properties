spring.application.name=ebank-backend
server.port=8085

# ===== Default (dev) profile: H2 in-memory =====
spring.datasource.url=jdbc:h2:mem:ebank-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger / OpenAPI UI available at /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JWT - override JWT_SECRET as an environment variable in real deployments.
# Must be at least 32 characters for HS256. Never commit a real secret.
jwt.secret=${JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me}
jwt.expiration-ms=86400000

# OpenAI key for the Part 4 chatbot - read from env var only, never hardcoded.
openai.api.key=${OPENAI_API_KEY:}

# Telegram bot - both must be set as env vars for the bot to start.
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:}
