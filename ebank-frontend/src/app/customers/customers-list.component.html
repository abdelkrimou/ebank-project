<div class="app-container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Customers</h3>
    <a class="btn btn-primary" routerLink="/customers/new">+ New customer</a>
  </div>

  <div class="input-group mb-3" style="max-width: 400px;">
    <input class="form-control" placeholder="Search by name" [(ngModel)]="keyword" (keyup.enter)="search()">
    <button class="btn btn-outline-secondary" (click)="search()">Search</button>
  </div>

  <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

  <table class="table table-striped bg-white">
    <thead>
      <tr><th>ID</th><th>Name</th><th>Email</th><th></th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of customers">
        <td>{{ c.id }}</td>
        <td>{{ c.name }}</td>
        <td>{{ c.email }}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-primary me-2" (click)="viewAccounts(c.id)">Accounts</button>
          <button class="btn btn-sm btn-outline-danger" (click)="deleteCustomer(c.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
