<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card p-4 shadow-sm" style="width: 360px;">
    <h4 class="mb-3 text-center">E-Bank Login</h4>

    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" formControlName="username">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password">
      </div>
      <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
      <p class="text-muted small mt-3 mb-0">Dev default: admin / admin123 (change it!)</p>
    </form>
  </div>
</div>
